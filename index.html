<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클릭 게임</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#222;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
#game{
    width:800px;
    height:500px;
    background:#111;
    border:4px solid #555;
    position:relative;
    overflow:hidden;
    border-radius:15px;
}
#target{
    width:50px;
    height:50px;
    background:#ff4444;
    border-radius:50%;
    position:absolute;
    cursor:pointer;
    transition:.08s;
}
#info{
    position:absolute;
    left:15px;
    top:15px;
    font-size:20px;
}
#start{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    padding:15px 35px;
    font-size:22px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
}
</style>
</head>
<body>

<div id="game">

<div id="info">
점수 : <span id="score">0</span><br>
남은시간 : <span id="time">30</span>초
</div>

<div id="target" style="display:none;"></div>

<button id="start">게임 시작</button>

</div>

<script>

const game=document.getElementById("game");
const target=document.getElementById("target");
const scoreText=document.getElementById("score");
const timeText=document.getElementById("time");
const startBtn=document.getElementById("start");

let score=0;
let time=30;
let timer;

function moveTarget(){

    const x=Math.random()*(game.clientWidth-60);
    const y=Math.random()*(game.clientHeight-60);

    target.style.left=x+"px";
    target.style.top=y+"px";

}

target.onclick=function(){

    score++;
    scoreText.textContent=score;

    const size=40+Math.random()*30;
    target.style.width=size+"px";
    target.style.height=size+"px";

    moveTarget();

}

startBtn.onclick=function(){

    score=0;
    time=30;

    scoreText.textContent=0;
    timeText.textContent=30;

    startBtn.style.display="none";
    target.style.display="block";

    moveTarget();

    clearInterval(timer);

    timer=setInterval(function(){

        time--;
        timeText.textContent=time;

        if(time<=0){

            clearInterval(timer);

            target.style.display="none";

            startBtn.style.display="block";
            startBtn.textContent="다시하기";

            alert("게임 종료!\n점수 : "+score);

        }

    },1000);

}

</script>

</body>
</html>
